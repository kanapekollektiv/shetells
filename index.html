<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sea shells — she tells</title>
  <style>
    @font-face {
      font-family: 'NaNTresorM';
      src: url('NaNTresorM-Bold.ttf') format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'NaNTresorM';
      src: url('NaNTresorM-Regular.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Celescript';
      src: url('Celescript.ttf') format('truetype');
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background-image: url('shell.png');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* ── Main content layer ── */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Top bar: header left + nav right ── */
    .top-bar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 36px 30px 0 48px;
      flex: 1;
    }

    /* Top-left text block */
    .header {
      display: flex;
      flex-direction: column;
    }

    /* 5. Regular weight instead of bold */
    .title {
      font-family: 'NaNTresorM', serif;
      font-weight: 400;
      font-size: 62pt;
      color: #6e00b0;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-family: 'Celescript', cursive;
      font-size: 16pt;
      color: #6e00b0;
      margin-top: 8px;
      padding-bottom: 6px;
      border-bottom: 3px solid #6e00b0;
      display: inline-block;
    }

    /* ── Top-right nav buttons ── */
    .nav {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 30px;
      padding-top: 10px;
    }

    /* 1. Rounded corners on all buttons */
    .btn {
      font-family: 'Celescript', cursive;
      font-size: 12pt;
      line-height: 1;
      padding: 8px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }

    /* 3. "tell us your memories!" — difference blend, white text */
    .btn-memories {
      background-color: #000000;
      color: #ffffff;
      mix-blend-mode: difference;
    }

    /* 2. "info" — no outline, white bg, purple text */
    .btn-info {
      background-color: #ffffff;
      color: #6e00b0;
      border: none;
    }

    /* ── Bottom section ── */
    .bottom {
      width: 100%;
      position: relative;
    }

    .toolkit {
      padding: 0 48px 20px 48px;
    }

    .toolkit p {
      font-family: 'Celescript', cursive;
      font-size: 16pt;
      color: #6e00b0;
      line-height: 1.5;
      white-space: pre-line;
    }

    .text-wrap {
      width: 100%;
      line-height: 0;
    }

    .text-wrap img {
      width: 100%;
      display: block;
      mix-blend-mode: screen;
    }

    /* ────────────────────────────────────────────
       6. Info overlay modal
    ──────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.active {
      display: flex;
    }

    /* Wrapper: positions the blend layer and text independently */
    .overlay-wrapper {
      position: relative;
      max-width: 560px;
      width: 90%;
    }

    /* White box in difference mode → inverted background colours show through */
    .overlay-blend {
      position: absolute;
      inset: 0;
      background: #ffffff;
      mix-blend-mode: difference;
      border-radius: 24px;
      z-index: 0;
    }

    /* Text layer sits above the blend, unaffected, in true white */
    .overlay-box {
      position: relative;
      z-index: 1;
      border-radius: 24px;
      padding: 48px 56px;
    }

    .overlay-box p {
      font-family: 'NaNTresorM', serif;
      font-weight: 400;
      font-size: 18pt;
      color: #ffffff;
      line-height: 1.5;
    }

    .overlay-close {
      position: absolute;
      top: 18px;
      right: 22px;
      background: none;
      border: none;
      color: #ffffff;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      font-family: 'NaNTresorM', serif;
    }

    /* ────────────────────────────────────────────
       4. Mobile layout (≤ 600px)
    ──────────────────────────────────────────── */
    @media (max-width: 600px) {

      .top-bar {
        flex-direction: column;
        align-items: flex-start;
        padding: 24px 20px 0 24px;
        gap: 20px;
      }

      .title {
        font-size: 38pt;
      }

      /* On mobile nav goes full-width, stacked, left-aligned */
      .nav {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        padding-top: 0;
        width: 100%;
      }

      /* On mobile "info" aligns to the right */
      .btn-info {
        align-self: flex-end;
      }

      .toolkit {
        padding: 0 24px 16px 24px;
      }

      .overlay-box {
        padding: 32px 28px;
      }

      .overlay-box p {
        font-size: 14pt;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="page">

    <!-- Top bar -->
    <div class="top-bar">
      <div class="header">
        <div class="title">sea shells</div>
        <div class="subtitle">we have lots to tell</div>
      </div>

      <nav class="nav">
        <a href="#" class="btn btn-memories">tell us your memories!</a>
        <a href="#" class="btn btn-info" id="infoBtn">info</a>
      </nav>
    </div>

    <!-- Bottom -->
    <div class="bottom">
      <div class="toolkit">
        <p>a critical toolkit
for listening
&amp; remembering</p>
      </div>
      <div class="text-wrap">
        <img src="shetells_purple_text.png" alt="she tells" />
      </div>
    </div>

  </div>

  <!-- 6. Info overlay -->
  <div class="overlay" id="infoOverlay">
    <div class="overlay-wrapper">
      <!-- blend layer: white + difference = inverted background colours -->
      <div class="overlay-blend"></div>
      <!-- text layer: sits above the blend, true white, unaffected -->
      <div class="overlay-box">
        <button class="overlay-close" id="overlayClose" aria-label="Close">✕</button>
        <p>this is the info, hello</p>
      </div>
    </div>
  </div>

  <script>
    const infoBtn     = document.getElementById('infoBtn');
    const overlay     = document.getElementById('infoOverlay');
    const closeBtn    = document.getElementById('overlayClose');

    infoBtn.addEventListener('click', function(e) {
      e.preventDefault();
      overlay.classList.add('active');
    });

    closeBtn.addEventListener('click', function() {
      overlay.classList.remove('active');
    });

    // Click outside the box to close
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) overlay.classList.remove('active');
    });

    // Escape key to close
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') overlay.classList.remove('active');
    });
  </script>
</body>
</html>
