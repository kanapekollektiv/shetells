<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sea shells — she tells</title>
  <style>
    @font-face {
      font-family: 'NaNTresorM';
      src: url('NaNTresorM-Bold.ttf') format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'NaNTresorM';
      src: url('NaNTresorM-Regular.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Celescript';
      src: url('Celescript.ttf') format('truetype');
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Background: shell.png fills full width, covers the page */
    .bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background-image: url('shell.png');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* Main content layer */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Top-left text block */
    .header {
      padding: 36px 48px;
      flex: 1;
    }

    .title {
      font-family: 'NaNTresorM', serif;
      font-weight: 700;
      font-size: 62pt;
      color: #6e00b0;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-family: 'Celescript', cursive;
      font-size: 16pt;
      color: #6e00b0;
      margin-top: 8px;
      /* underline rule below subtitle */
      padding-bottom: 6px;
      border-bottom: 1.5px solid #6e00b0;
      display: inline-block;
    }

    /* Bottom section */
    .bottom {
      width: 100%;
      position: relative;
    }

    /* Toolkit text sits above the bubble, left-aligned at same x as subtitle */
    .toolkit {
      padding: 0 48px 20px 48px;
    }

    .toolkit p {
      font-family: 'Celescript', cursive;
      font-size: 16pt;
      color: #6e00b0;
      line-height: 1.5;
      white-space: pre-line;
    }

    /* Purple bubble image: full width, no gap at bottom */
    .bubble-wrap {
      width: 100%;
      line-height: 0;
    }

    .bubble-wrap img {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="page">
    <!-- Top-left header -->
    <div class="header">
      <div class="title">sea shells</div>
      <div class="subtitle">we have lots to tell</div>
    </div>

    <!-- Bottom: toolkit label + bubble -->
    <div class="bottom">
      <div class="toolkit">
        <p>a critical toolkit
for listening
&amp; remembering</p>
      </div>
      <div class="bubble-wrap">
        <img src="shetells_purple_bubble.png" alt="she tells" />
      </div>
    </div>
  </div>
</body>
</html>
