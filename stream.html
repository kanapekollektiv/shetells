<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sea shells — stream</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background-image: url('blueshell.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
    }

    .stream-bg {
      position: fixed;
      inset: 0;
      background-image: url('blueshell.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    .stream-page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 100%;
      min-height: 100vh;
      padding: 36px 48px;
      gap: 24px;
    }

    /* Back link */
    .back-link {
      font-family: 'Celescript', cursive;
      font-size: 14pt;
      color: #ff6ef7;
      text-decoration: none;
      padding-bottom: 4px;
      border-bottom: 1.5px solid #ff6ef7;
      mix-blend-mode: difference;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 0.7; }

    /* ── Player: single pill row ── */
    .player-wrapper {
      position: relative;
      /* width fits content */
      display: inline-flex;
    }

    #playerCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 999px;
      display: block;
      z-index: 0;
    }

    /* One flex row: play · label · vol label · slider · status */
    .player {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      padding: 10px 24px;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* Play/pause button — just the icon, no background */
    .play-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .play-icon { width: 14px; height: 14px; fill: #ffffff; display: block; }

    /* "stream" label */
    .player-label {
      font-family: 'Celescript', cursive;
      font-size: 13pt;
      color: #ffffff;
    }

    /* Divider */
    .player-divider {
      width: 1px;
      height: 14px;
      background: rgba(255,255,255,0.35);
      flex-shrink: 0;
    }

    /* Volume */
    .volume-label {
      font-family: 'Celescript', cursive;
      font-size: 11pt;
      color: rgba(255,255,255,0.75);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 2px;
      border-radius: 999px;
      background: rgba(255,255,255,0.4);
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffffff;
      border: none;
      cursor: pointer;
    }

    /* Status dot */
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.live { background: #7fff7f; }

    /* Status text */
    .status-text {
      font-family: 'Celescript', cursive;
      font-size: 11pt;
      color: rgba(255,255,255,0.65);
    }

    @media (max-width: 600px) {
      .stream-page { padding: 24px 20px; }
      input[type="range"] { width: 60px; }
    }
  </style>
</head>
<body>
  <div class="stream-bg"></div>

  <div class="stream-page">
    <a href="index.html" class="back-link">← sea shells</a>

    <div class="player-wrapper" id="playerWrapper">
      <canvas id="playerCanvas"></canvas>
      <div class="player">

        <button class="play-btn" id="playBtn" aria-label="Play / Pause">
          <svg class="play-icon" id="playIcon" viewBox="0 0 14 14">
            <polygon points="2,1 13,7 2,13" />
          </svg>
        </button>

        <span class="player-label">stream</span>

        <div class="player-divider"></div>

        <span class="volume-label">vol</span>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" aria-label="Volume" />

        <div class="player-divider"></div>

        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">offline</span>

      </div>
    </div>
  </div>

  <script>
    /* ── Inverted canvas background ── */
    const bgImg = new Image();
    bgImg.crossOrigin = 'anonymous';
    bgImg.src = 'blueshell.png';

    function drawInverted(canvas, rect) {
      const W = Math.round(rect.width);
      const H = Math.round(rect.height);
      if (W === 0 || H === 0) return;
      canvas.width  = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      const vw  = window.innerWidth;
      const vh  = window.innerHeight;
      const iw  = bgImg.naturalWidth  || 1;
      const ih  = bgImg.naturalHeight || 1;
      const scale   = Math.max(vw / iw, vh / ih);
      const offsetX = (vw - iw * scale) / 2;
      const offsetY = (vh - ih * scale) / 2;
      const sx = (rect.left - offsetX) / scale;
      const sy = (rect.top  - offsetY) / scale;
      ctx.drawImage(bgImg, sx, sy, W / scale, H / scale, 0, 0, W, H);
      const id = ctx.getImageData(0, 0, W, H);
      const d  = id.data;
      for (let i = 0; i < d.length; i += 4) {
        d[i]     = 255 - d[i];
        d[i + 1] = 255 - d[i + 1];
        d[i + 2] = 255 - d[i + 2];
      }
      ctx.putImageData(id, 0, 0);
    }

    const playerWrapper = document.getElementById('playerWrapper');
    const playerCanvas  = document.getElementById('playerCanvas');

    function refreshCanvas() {
      requestAnimationFrame(() => {
        drawInverted(playerCanvas, playerWrapper.getBoundingClientRect());
      });
    }

    if (bgImg.complete && bgImg.naturalWidth) {
      refreshCanvas();
    } else {
      bgImg.addEventListener('load', refreshCanvas);
    }
    window.addEventListener('resize', refreshCanvas);

    /* ── Audio player ── */
    const STREAM_URL   = 'https://shell.kokott.art/streams/debug/stream';
    const playBtn      = document.getElementById('playBtn');
    const playIcon     = document.getElementById('playIcon');
    const volumeSlider = document.getElementById('volumeSlider');
    const statusDot    = document.getElementById('statusDot');
    const statusText   = document.getElementById('statusText');

    const PLAY_PATH  = '<polygon points="2,1 13,7 2,13"/>';
    const PAUSE_PATH = '<rect x="1" y="1" width="4" height="12"/><rect x="9" y="1" width="4" height="12"/>';

    let audio   = null;
    let playing = false;

    function setStatus(text, live) {
      statusText.textContent = text;
      statusDot.classList.toggle('live', live);
    }

    function setPlayState(isPlaying) {
      playing = isPlaying;
      playIcon.innerHTML = isPlaying ? PAUSE_PATH : PLAY_PATH;
    }

    playBtn.addEventListener('click', () => {
      if (!audio) {
        audio = new Audio();
        audio.crossOrigin = 'anonymous';
        audio.volume = parseFloat(volumeSlider.value);

        audio.addEventListener('waiting', () => setStatus('connecting…', false));
        audio.addEventListener('playing', () => setStatus('live', true));
        audio.addEventListener('stalled', () => setStatus('buffering…', false));
        audio.addEventListener('error',   () => {
          setStatus('error', false);
          setPlayState(false);
          audio = null;
        });

        setStatus('connecting…', false);
        audio.src = STREAM_URL;
        audio.play().catch(() => {
          setStatus('offline', false);
          setPlayState(false);
          audio = null;
        });
        setPlayState(true);
      } else {
        audio.pause();
        audio.src = '';
        audio = null;
        setPlayState(false);
        setStatus('offline', false);
      }
    });

    volumeSlider.addEventListener('input', () => {
      if (audio) audio.volume = parseFloat(volumeSlider.value);
    });
  </script>
</body>
</html>
