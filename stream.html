<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sea shells — stream</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Stream page overrides ── */
    body {
      background-image: url('blueshell.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
    }

    .stream-bg {
      position: fixed;
      inset: 0;
      background-image: url('blueshell.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* ── Player container ── */
    .stream-page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      min-height: 100vh;
      padding: 48px 24px 32px;
      gap: 32px;
    }

    /* Back link */
    .back-link {
      align-self: flex-start;
      font-family: 'Celescript', cursive;
      font-size: 14pt;
      color: #ff6ef7;   /* inverted from the deep blue of blueshell */
      text-decoration: none;
      padding: 6px 0;
      border-bottom: 1.5px solid #ff6ef7;
      mix-blend-mode: difference;
      transition: opacity 0.2s;
    }

    .back-link:hover { opacity: 0.7; }

    /* ── Custom audio player ── */
    .player-wrapper {
      position: relative;
      width: 100%;
      max-width: 560px;
    }

    /* Inverted-colour canvas sits behind the player UI */
    #playerCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      display: block;
      z-index: 0;
    }

    .player {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 36px 40px 32px;
      border-radius: 24px;
    }

    /* Title row */
    .player-title {
      font-family: 'Celescript', cursive;
      font-size: 22pt;
      color: #ffffff;
      line-height: 1.1;
      text-align: center;
    }

    .player-subtitle {
      font-family: 'Celescript', cursive;
      font-size: 12pt;
      color: rgba(255,255,255,0.75);
      text-align: center;
      margin-top: -14px;
    }

    /* Controls row: play + volume */
    .player-controls {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    /* Play / pause button */
    .play-btn {
      font-family: 'Celescript', cursive;
      font-size: 13pt;
      color: #ffffff;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 999px;
      padding: 10px 28px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .play-btn:hover { background: rgba(255,255,255,0.28); }

    /* Play icon (SVG inline) */
    .play-icon { width: 16px; height: 16px; fill: #ffffff; flex-shrink: 0; }

    /* Volume row */
    .volume-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
    }

    .volume-label {
      font-family: 'Celescript', cursive;
      font-size: 11pt;
      color: rgba(255,255,255,0.8);
      white-space: nowrap;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.4);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      border: none;
      cursor: pointer;
    }

    /* Status indicator */
    .player-status {
      font-family: 'Celescript', cursive;
      font-size: 11pt;
      color: rgba(255,255,255,0.6);
      text-align: center;
      min-height: 1.4em;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      margin-right: 6px;
      vertical-align: middle;
      transition: background 0.3s;
    }

    .status-dot.live { background: #7fff7f; }

    /* Responsive */
    @media (max-width: 480px) {
      .player { padding: 28px 24px 24px; }
      .player-title { font-size: 18pt; }
      input[type="range"] { width: 90px; }
    }
  </style>
</head>
<body>
  <div class="stream-bg"></div>

  <div class="stream-page">

    <a href="index.html" class="back-link">← sea shells</a>

    <div class="player-wrapper" id="playerWrapper">
      <canvas id="playerCanvas"></canvas>

      <div class="player">
        <div class="player-title">stream</div>
        <div class="player-subtitle">live audio</div>

        <div class="player-controls">
          <button class="play-btn" id="playBtn" aria-label="Play">
            <!-- play icon -->
            <svg class="play-icon" id="playIcon" viewBox="0 0 16 16">
              <polygon points="3,1 15,8 3,15" />
            </svg>
            <span id="playLabel">play</span>
          </button>

          <div class="volume-row">
            <span class="volume-label">vol</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" aria-label="Volume" />
          </div>
        </div>

        <div class="player-status">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">press play to connect</span>
        </div>
      </div>
    </div>

  </div>

  <script>
    /* ── Inverted canvas background ── */
    const bgImg = new Image();
    bgImg.crossOrigin = 'anonymous';
    bgImg.src = 'blueshell.png';

    function drawInverted(canvas, rect) {
      const W = Math.round(rect.width);
      const H = Math.round(rect.height);
      if (W === 0 || H === 0) return;
      canvas.width  = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      const vw  = window.innerWidth;
      const vh  = window.innerHeight;
      const iw  = bgImg.naturalWidth  || 1;
      const ih  = bgImg.naturalHeight || 1;
      const scale   = Math.max(vw / iw, vh / ih);
      const offsetX = (vw - iw * scale) / 2;
      const offsetY = (vh - ih * scale) / 2;
      const sx = (rect.left - offsetX) / scale;
      const sy = (rect.top  - offsetY) / scale;
      ctx.drawImage(bgImg, sx, sy, W / scale, H / scale, 0, 0, W, H);
      const id = ctx.getImageData(0, 0, W, H);
      const d  = id.data;
      for (let i = 0; i < d.length; i += 4) {
        d[i]     = 255 - d[i];
        d[i + 1] = 255 - d[i + 1];
        d[i + 2] = 255 - d[i + 2];
      }
      ctx.putImageData(id, 0, 0);
    }

    const playerWrapper = document.getElementById('playerWrapper');
    const playerCanvas  = document.getElementById('playerCanvas');

    function refreshCanvas() {
      requestAnimationFrame(() => {
        drawInverted(playerCanvas, playerWrapper.getBoundingClientRect());
      });
    }

    if (bgImg.complete && bgImg.naturalWidth) {
      refreshCanvas();
    } else {
      bgImg.addEventListener('load', refreshCanvas);
    }
    window.addEventListener('resize', refreshCanvas);

    /* ── Audio player ── */
    const STREAM_URL  = 'https://shell.kokott.art/streams/debug/stream';
    const playBtn     = document.getElementById('playBtn');
    const playIcon    = document.getElementById('playIcon');
    const playLabel   = document.getElementById('playLabel');
    const volumeSlider = document.getElementById('volumeSlider');
    const statusDot   = document.getElementById('statusDot');
    const statusText  = document.getElementById('statusText');

    // SVG paths for play / pause
    const PLAY_PATH  = '<polygon points="3,1 15,8 3,15" />';
    const PAUSE_PATH = '<rect x="2" y="1" width="4" height="14"/><rect x="10" y="1" width="4" height="14"/>';

    let audio   = null;
    let playing = false;

    function setStatus(text, live) {
      statusText.textContent = text;
      statusDot.classList.toggle('live', live);
    }

    function setPlayState(isPlaying) {
      playing = isPlaying;
      playIcon.innerHTML = isPlaying ? PAUSE_PATH : PLAY_PATH;
      playLabel.textContent = isPlaying ? 'pause' : 'play';
    }

    playBtn.addEventListener('click', () => {
      if (!audio) {
        // First press — create the audio element fresh each time
        // so the live stream always starts from "now"
        audio = new Audio();
        audio.crossOrigin = 'anonymous';
        audio.volume = parseFloat(volumeSlider.value);

        audio.addEventListener('waiting', () => setStatus('connecting…', false));
        audio.addEventListener('playing', () => setStatus('live', true));
        audio.addEventListener('error',   () => { setStatus('connection error', false); setPlayState(false); audio = null; });
        audio.addEventListener('stalled', () => setStatus('buffering…', false));

        setStatus('connecting…', false);
        audio.src = STREAM_URL;
        audio.play().catch(() => {
          setStatus('could not connect', false);
          setPlayState(false);
          audio = null;
        });
        setPlayState(true);

      } else if (playing) {
        // Pause: destroy the audio so we don't keep buffering
        audio.pause();
        audio.src = '';
        audio = null;
        setPlayState(false);
        setStatus('press play to connect', false);
      }
    });

    volumeSlider.addEventListener('input', () => {
      if (audio) audio.volume = parseFloat(volumeSlider.value);
    });
  </script>
</body>
</html>
