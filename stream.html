<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sea shells — stream</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background-image: url('blueshell.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .stream-bg {
      position: fixed;
      inset: 0;
      background-image: url('blueshell.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* Full-screen flex column, fills viewport */
    .stream-page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      width: 100%;
      height: 100vh;
      padding: 36px 48px;
    }

    /* Back link */
    .back-link {
      font-family: 'Celescript', cursive;
      font-size: 14pt;
      color: #ff6ef7;
      text-decoration: none;
      padding-bottom: 4px;
      border-bottom: 1.5px solid #ff6ef7;
      mix-blend-mode: difference;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 0.7; }

    /* ── Player pill shared styles ── */
    .player-wrapper {
      position: relative;
      display: inline-flex;
    }

    /* Centre player: override position to be centred */
    .player-wrapper-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* The canvas fills the pill shape */
    .player-wrapper canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 999px;
      display: block;
      z-index: 0;
    }

    /* One flex row inside the pill */
    .player {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      padding: 10px 24px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .play-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .play-icon { width: 14px; height: 14px; fill: #ffffff; display: block; }

    .player-label {
      font-family: 'Celescript', cursive;
      font-size: 13pt;
      color: #ffffff;
    }

    .player-divider {
      width: 1px;
      height: 14px;
      background: rgba(255,255,255,0.35);
      flex-shrink: 0;
    }

    .volume-label {
      font-family: 'Celescript', cursive;
      font-size: 11pt;
      color: rgba(255,255,255,0.75);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 2px;
      border-radius: 999px;
      background: rgba(255,255,255,0.4);
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffffff;
      border: none;
      cursor: pointer;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.live { background: #7fff7f; }

    .status-text {
      font-family: 'Celescript', cursive;
      font-size: 11pt;
      color: rgba(255,255,255,0.65);
    }

    @media (max-width: 600px) {
      .stream-page { padding: 24px 20px; }
      input[type="range"] { width: 60px; }
    }
  </style>
</head>
<body>
  <div class="stream-bg"></div>

  <div class="stream-page">

    <!-- Top-left pill -->
    <div class="player-wrapper" id="playerWrapperTop">
      <canvas id="playerCanvasTop"></canvas>
      <div class="player">
        <button class="play-btn" id="playBtnTop" aria-label="Play / Pause">
          <svg class="play-icon" id="playIconTop" viewBox="0 0 14 14">
            <polygon points="2,1 13,7 2,13" />
          </svg>
        </button>
        <span class="player-label">stream</span>
        <div class="player-divider"></div>
        <span class="volume-label">vol</span>
        <input type="range" id="volumeSliderTop" min="0" max="1" step="0.01" value="0.8" aria-label="Volume" />
        <div class="player-divider"></div>
        <div class="status-dot" id="statusDotTop"></div>
        <span class="status-text" id="statusTextTop">offline</span>
      </div>
    </div>

    <!-- Back link bottom-left -->
    <a href="index.html" class="back-link">← sea shells</a>

    <!-- Centre pill — absolutely centred in the page -->
    <div class="player-wrapper player-wrapper-center" id="playerWrapperCenter">
      <canvas id="playerCanvasCenter"></canvas>
      <div class="player">
        <button class="play-btn" id="playBtnCenter" aria-label="Play / Pause">
          <svg class="play-icon" id="playIconCenter" viewBox="0 0 14 14">
            <polygon points="2,1 13,7 2,13" />
          </svg>
        </button>
        <span class="player-label">stream</span>
        <div class="player-divider"></div>
        <span class="volume-label">vol</span>
        <input type="range" id="volumeSliderCenter" min="0" max="1" step="0.01" value="0.8" aria-label="Volume" />
        <div class="player-divider"></div>
        <div class="status-dot" id="statusDotCenter"></div>
        <span class="status-text" id="statusTextCenter">offline</span>
      </div>
    </div>

  </div>

  <script>
    /* ── Shared inverted-canvas draw ── */
    const bgImg = new Image();
    bgImg.crossOrigin = 'anonymous';
    bgImg.src = 'blueshell.png';

    function drawInverted(canvas, rect) {
      const W = Math.round(rect.width);
      const H = Math.round(rect.height);
      if (W === 0 || H === 0) return;
      canvas.width  = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      const vw  = window.innerWidth;
      const vh  = window.innerHeight;
      const iw  = bgImg.naturalWidth  || 1;
      const ih  = bgImg.naturalHeight || 1;
      const scale   = Math.max(vw / iw, vh / ih);
      const offsetX = (vw - iw * scale) / 2;
      const offsetY = (vh - ih * scale) / 2;
      const sx = (rect.left - offsetX) / scale;
      const sy = (rect.top  - offsetY) / scale;
      ctx.drawImage(bgImg, sx, sy, W / scale, H / scale, 0, 0, W, H);
      const id = ctx.getImageData(0, 0, W, H);
      const d  = id.data;
      for (let i = 0; i < d.length; i += 4) {
        d[i]     = 255 - d[i];
        d[i + 1] = 255 - d[i + 1];
        d[i + 2] = 255 - d[i + 2];
      }
      ctx.putImageData(id, 0, 0);
    }

    function refreshAllCanvases() {
      requestAnimationFrame(() => {
        drawInverted(
          document.getElementById('playerCanvasTop'),
          document.getElementById('playerWrapperTop').getBoundingClientRect()
        );
        drawInverted(
          document.getElementById('playerCanvasCenter'),
          document.getElementById('playerWrapperCenter').getBoundingClientRect()
        );
      });
    }

    if (bgImg.complete && bgImg.naturalWidth) {
      refreshAllCanvases();
    } else {
      bgImg.addEventListener('load', refreshAllCanvases);
    }
    window.addEventListener('resize', refreshAllCanvases);

    /* ── Single shared audio instance ── */
    const STREAM_URL = 'https://shell.kokott.art/streams/debug/stream';
    const PLAY_PATH  = '<polygon points="2,1 13,7 2,13"/>';
    const PAUSE_PATH = '<rect x="1" y="1" width="4" height="12"/><rect x="9" y="1" width="4" height="12"/>';

    let audio   = null;
    let playing = false;

    // All player UI elements (top + center)
    const players = [
      {
        btn:    document.getElementById('playBtnTop'),
        icon:   document.getElementById('playIconTop'),
        vol:    document.getElementById('volumeSliderTop'),
        dot:    document.getElementById('statusDotTop'),
        status: document.getElementById('statusTextTop'),
      },
      {
        btn:    document.getElementById('playBtnCenter'),
        icon:   document.getElementById('playIconCenter'),
        vol:    document.getElementById('volumeSliderCenter'),
        dot:    document.getElementById('statusDotCenter'),
        status: document.getElementById('statusTextCenter'),
      },
    ];

    // Sync all UIs at once
    function setStatus(text, live) {
      players.forEach(p => {
        p.status.textContent = text;
        p.dot.classList.toggle('live', live);
      });
    }

    function setPlayState(isPlaying) {
      playing = isPlaying;
      players.forEach(p => {
        p.icon.innerHTML = isPlaying ? PAUSE_PATH : PLAY_PATH;
      });
    }

    function togglePlay() {
      if (!audio) {
        audio = new Audio();
        audio.crossOrigin = 'anonymous';
        // Use the average of both volume sliders, or just top's value
        audio.volume = parseFloat(players[0].vol.value);

        audio.addEventListener('waiting', () => setStatus('connecting…', false));
        audio.addEventListener('playing', () => setStatus('live', true));
        audio.addEventListener('stalled', () => setStatus('buffering…', false));
        audio.addEventListener('error',   () => {
          setStatus('error', false);
          setPlayState(false);
          audio = null;
        });

        setStatus('connecting…', false);
        audio.src = STREAM_URL;
        audio.play().catch(() => {
          setStatus('offline', false);
          setPlayState(false);
          audio = null;
        });
        setPlayState(true);
      } else {
        audio.pause();
        audio.src = '';
        audio = null;
        setPlayState(false);
        setStatus('offline', false);
      }
    }

    // Both play buttons trigger the same audio
    players.forEach(p => {
      p.btn.addEventListener('click', togglePlay);
      // Volume sliders both control the same audio
      p.vol.addEventListener('input', () => {
        if (audio) audio.volume = parseFloat(p.vol.value);
        // Keep sliders in sync with each other
        players.forEach(q => { q.vol.value = p.vol.value; });
      });
    });
  </script>
</body>
</html>
