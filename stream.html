<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>she tells — stream</title>
  <link rel="stylesheet" href="css/style2.css" />
  <style>

    /* ── Background layers ── */
    .stream-bg-white {
      position: fixed;
      inset: 0;
      background: #ffffff;
      z-index: 0;
      transition: opacity 0.9s ease;
    }

    .stream-bg-image {
      position: fixed;
      inset: 0;
      background-image: url('blueshell.png');
      background-size: cover;
      background-position: center;
      z-index: 0;
      opacity: 0;
      transition: opacity 0.9s ease;
    }

    body.is-playing .stream-bg-white { opacity: 0; }
    body.is-playing .stream-bg-image { opacity: 1; }

    /* ── Page wrapper ── */
    .stream-page {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header colour flips when playing ── */
    body.is-playing .brand-title,
    body.is-playing .brand-sub       { color: var(--white); }
    body.is-playing .btn-circle      { border-color: var(--white); background: rgba(255,255,255,0.12); color: var(--white); }
    body.is-playing .btn-circle:hover{ background: var(--white); color: var(--black); }
    body.is-playing .btn-filled      { background: var(--brown); }
    body.is-playing .btn-filled:hover{ background: #7a3620; }

    /* ── Centred player area ── */
    .stream-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Player pill — outlined like btn-outline ── */
    .stream-player {
      display: inline-flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.65rem 1.6rem;
      border-radius: 2rem;
      border: 1.5px solid var(--black);
      background: var(--white);
      cursor: default;
    }

    /* ── Play / pause button ── */
    .play-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .play-icon {
      width: 14px;
      height: 14px;
      fill: var(--black);
      display: block;
      transition: fill 0.35s;
    }

    /* ── Player text elements ── */
    .player-label {
      font-family: 'CeleScript', cursive;
      font-size: clamp(12px, 1.4vw, 18px);
      letter-spacing: 0.06em;
      color: var(--black);
      transition: color 0.35s;
    }

    .player-divider {
      width: 1px;
      height: 14px;
      background: rgba(0,0,0,0.2);
      flex-shrink: 0;
      transition: background 0.35s;
    }

    .volume-label {
      font-family: 'CeleScript', cursive;
      font-size: clamp(10px, 1.1vw, 14px);
      color: rgba(0,0,0,0.5);
      letter-spacing: 0.04em;
      transition: color 0.35s;
    }

    /* ── Volume slider ── */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 2px;
      border-radius: 999px;
      background: rgba(0,0,0,0.18);
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.35s;
    }
    body.is-playing input[type="range"] { background: rgba(255,255,255,0.3); }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--black);
      cursor: pointer;
      transition: background 0.35s;
    }
    input[type="range"]::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--black);
      border: none;
      cursor: pointer;
    }

    /* ── Status indicator ── */
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(0,0,0,0.18);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.live { background: #7fff7f; }

    .status-text {
      font-family: 'CeleScript', cursive;
      font-size: clamp(10px, 1.1vw, 14px);
      letter-spacing: 0.04em;
      color: rgba(0,0,0,0.45);
      transition: color 0.35s;
    }
    /* ── Bubbles — only visible when playing ── */
    .bubble-word {
      position: fixed;
      bottom: -60px;
      font-family: 'CeleScript', cursive;
      color: rgba(255,255,255,0.65);
      pointer-events: none;
      z-index: 999;
      opacity: 0;
      font-size: var(--size);
      letter-spacing: 0.08em;
      animation: bubbleRise var(--duration) ease-in forwards;
    }

    @keyframes bubbleRise {
      0%   { transform: translateY(0)      translateX(0);             opacity: 0; }
      10%  { opacity: 1; }
      50%  { transform: translateY(-45vh)  translateX(var(--wobble)); opacity: 0.75; }
      90%  { opacity: 0.35; }
      100% { transform: translateY(-105vh) translateX(0);             opacity: 0; }
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .stream-player {
        flex-wrap: wrap;
        max-width: calc(100vw - 3rem);
        justify-content: center;
        gap: 0.6rem;
        padding: 0.6rem 1.2rem;
      }
      input[type="range"] { width: 60px; }
    }

  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="stream-bg-white"></div>
  <div class="stream-bg-image"></div>

  <div class="stream-page">

    <!-- Header — same structure as landing page -->
    <header class="header">
      <a href="index.html" style="text-decoration:none;">
        <div class="brand">
          <span class="brand-title">she tells</span>
          <span class="brand-sub"><svg class="brand-line" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 55.87 5.06" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width=".75" d="M.91,3.32c3.46.66,15.77,1.65,22.92.28,4.78-.91,15.54-2.85,19.76-2.83,3.81.02,8.93,0,11.38.86"/></svg>sea shells</span>
        </div>
      </a>
      <nav class="nav-buttons">
        <a href="memories.html" class="btn btn-filled">Send your memories today!</a>
      </nav>
    </header>

    <!-- Centred stream player -->
    <div class="stream-center">
      <div class="stream-player">
        <button class="play-btn" id="playBtn" aria-label="Play / Pause">
          <svg class="play-icon" id="playIcon" viewBox="0 0 14 14">
            <polygon points="2,1 13,7 2,13" />
          </svg>
        </button>
        <span class="player-label">stream</span>
        <div class="player-divider"></div>
        <span class="volume-label">vol</span>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" aria-label="Volume" />
        <div class="player-divider"></div>
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">offline</span>
      </div>
    </div>

  </div>

  <script>
    const STREAM_URL = 'https://shell.kokott.art/ambient.mp3';
    const PLAY_PATH  = '<polygon points="2,1 13,7 2,13"/>';
    const PAUSE_PATH = '<rect x="1" y="1" width="4" height="12"/><rect x="9" y="1" width="4" height="12"/>';

    const playBtn    = document.getElementById('playBtn');
    const playIcon   = document.getElementById('playIcon');
    const volSlider  = document.getElementById('volumeSlider');
    const statusDot  = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    let audio      = null;
    let playing    = false;
    let bubbleTimer = null;

    /* ── Status ── */
    function setStatus(text, live) {
      statusText.textContent = text;
      statusDot.classList.toggle('live', live);
    }

    /* ── Play state ── */
    function setPlayState(isPlaying) {
      playing = isPlaying;
      playIcon.innerHTML = isPlaying ? PAUSE_PATH : PLAY_PATH;
      document.body.classList.toggle('is-playing', isPlaying);
      isPlaying ? startBubbles() : stopBubbles();
    }

    /* ── Bubble words ── */
    const BUBBLE_WORDS = ['stream', 'stream', 'shhh', '~', 'stream'];

    function spawnBubble() {
      const el       = document.createElement('span');
      el.className   = 'bubble-word';
      el.textContent = BUBBLE_WORDS[Math.floor(Math.random() * BUBBLE_WORDS.length)];
      const x        = 5 + Math.random() * 85;
      const size     = (11 + Math.random() * 10).toFixed(1) + 'pt';
      const duration = (5  + Math.random() * 5).toFixed(1)  + 's';
      const wobble   = (Math.random() * 60 - 30).toFixed(0) + 'px';
      el.style.setProperty('--duration', duration);
      el.style.setProperty('--size',     size);
      el.style.setProperty('--wobble',   wobble);
      el.style.left = x + 'vw';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), parseFloat(duration) * 1000 + 100);
    }

    function startBubbles() {
      function schedule() {
        if (!playing) return;
        spawnBubble();
        bubbleTimer = setTimeout(schedule, 1200 + Math.random() * 1600);
      }
      schedule();
    }

    function stopBubbles() {
      clearTimeout(bubbleTimer);
      bubbleTimer = null;
    }

    /* ── Audio player ── */
    playBtn.addEventListener('click', () => {
      if (!audio) {
        audio = new Audio();
        audio.crossOrigin = 'anonymous';
        audio.volume = parseFloat(volSlider.value);
        audio.addEventListener('waiting', () => setStatus('connecting…', false));
        audio.addEventListener('playing', () => setStatus('live',        true));
        audio.addEventListener('stalled', () => setStatus('buffering…',  false));
        audio.addEventListener('error',   () => {
          setStatus('error', false);
          setPlayState(false);
          audio = null;
        });
        setStatus('connecting…', false);
        audio.src = STREAM_URL;
        audio.play().catch(() => {
          setStatus('offline', false);
          setPlayState(false);
          audio = null;
        });
        setPlayState(true);
      } else {
        audio.pause();
        audio.src = '';
        audio = null;
        setPlayState(false);
        setStatus('offline', false);
      }
    });

    volSlider.addEventListener('input', () => {
      if (audio) audio.volume = parseFloat(volSlider.value);
    });
  </script>

</body>
</html>
