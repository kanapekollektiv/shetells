<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sea shells — record your memory</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="memories.css" />
  <style>
    /* ── ExtraLight weight for brand title ── */
    @font-face {
      font-family: 'NaNTresorM';
      src: url('Fonts/NaNTresor/NaNTresorM-ExtraLight.ttf') format('truetype');
      font-weight: 200;
    }

    /* ── Brand header (matches all other pages) ── */
    .brand {
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
    }

    .brand-title {
      font-family: 'NaNTresorM', serif;
      font-weight: 200;
      font-size: clamp(40px, 5.5vw, 80px);
      line-height: 1;
      color: #0046FF;
      letter-spacing: -0.02em;
    }

    .brand-sub {
      font-family: 'Celescript', cursive;
      font-size: clamp(11px, 1.2vw, 16px);
      color: #0046FF;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
    }

    .brand-line {
      width: clamp(36px, 3.5vw, 55px);
      height: auto;
      display: block;
      flex-shrink: 0;
    }

    /* ── Recorder-specific styles ── */

    .rec-status {
      font-family: 'Celescript', cursive;
      font-size: 13pt;
      color: #0046FF;
      min-height: 1.6em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rec-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(0, 70, 255, 0.25);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .rec-dot.recording {
      background: #ff3b3b;
      animation: pulse 1s ease-in-out infinite;
    }

    .rec-dot.done { background: #0046FF; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* Timer */
    .rec-timer {
      font-family: 'NaNTresorM', serif;
      font-weight: 400;
      font-size: 36pt;
      color: #0046FF;
      letter-spacing: 0.04em;
      min-height: 1.2em;
    }

    /* Waveform visualiser */
    #waveform {
      width: 100%;
      max-width: 480px;
      height: 64px;
      border-radius: 12px;
      background: rgba(0, 70, 255, 0.06);
      display: block;
    }

    /* Audio playback preview */
    .rec-preview {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .rec-preview.visible { display: flex; }

    /* Custom audio player */
    .rec-player {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 480px;
    }

    .rec-player-controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .rec-progress-wrap {
      flex: 1;
      height: 3px;
      background: rgba(0, 70, 255, 0.15);
      border-radius: 999px;
      cursor: pointer;
      position: relative;
    }

    .rec-progress-bar {
      height: 100%;
      background: #0046FF;
      border-radius: 999px;
      width: 0%;
      transition: width 0.1s linear;
      pointer-events: none;
    }

    .rec-time {
      font-family: 'Celescript', cursive;
      font-size: 11pt;
      color: rgba(0, 70, 255, 0.6);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Tag question */
    .rec-tag-section {
      display: none;
      flex-direction: column;
      gap: 20px;
    }

    .rec-tag-section.visible { display: flex; }

    /* Send section */
    .rec-send-section {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .rec-send-section.visible { display: flex; }

    /* Match the send button's width to the email input / players (480px cap) */
    .rec-send-section .mem-btn-record {
      width: 100%;
      max-width: 480px;
    }

    .rec-feedback {
      font-family: 'Celescript', cursive;
      font-size: 13pt;
      color: #0046FF;
      min-height: 1.4em;
    }

    /* Divider */
    .rec-divider {
      width: 100%;
      max-width: 480px;
      height: 2px;
      background: rgba(0, 70, 255, 0.12);
      border-radius: 999px;
    }

    /* Selected tag highlight */
    .mem-btn.selected {
      background: #0046FF;
      color: #ffffff;
      border-color: #0046FF;
    }

    /* Control buttons — vertical stack */
    #controlButtons {
      flex-direction: column;
      align-items: flex-start;
    }

    #controlButtons .mem-btn {
      width: 100%;
      max-width: 480px;
    }

    /* "or" divider between record / upload */
    .rec-or {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 480px;
      font-family: 'Celescript', cursive;
      font-size: 11pt;
      color: rgba(0,70,255,0.4);
      padding: 4px 0;
    }

    .rec-or::before, .rec-or::after {
      content: '';
      flex: 1;
      height: 1.5px;
      background: rgba(0,70,255,0.18);
      border-radius: 999px;
    }

    /* Email input */
    .rec-email-input {
      font-family: 'Celescript', cursive;
      font-size: 13pt;
      color: #0046FF;
      background: transparent;
      border: 1.5px solid #0046FF;
      border-radius: 999px;
      padding: 12px 24px;
      max-width: 480px;
      width: 100%;
      outline: none;
      transition: border-color 0.18s;
    }

    .rec-email-input::placeholder { color: rgba(0, 70, 255, 0.4); }
    .rec-email-input:focus { border-color: #0035cc; }

    /* Re-record — small secondary action, natural width only */
    .mem-btn-rerecord {
      align-self: flex-start;
      font-size: 0.82em;
      opacity: 0.55;
      border-color: rgba(0, 70, 255, 0.35);
      transition: opacity 0.2s ease;
    }
    .mem-btn-rerecord:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="mem-bg"></div>

  <div class="mem-page">

    <!-- Header -->
    <div class="mem-topbar">
      <a href="index.html" style="text-decoration:none;">
        <div class="brand">
          <span class="brand-title">she tells</span>
          <span class="brand-sub"><svg class="brand-line" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 55.87 5.06" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width=".75" d="M.91,3.32c3.46.66,15.77,1.65,22.92.28,4.78-.91,15.54-2.85,19.76-2.83,3.81.02,8.93,0,11.38.86"/></svg>sea shells</span>
        </div>
      </a>
    </div>

    <div class="mem-content" style="gap: 32px;">

      <!-- Title -->
      <div class="mem-question">your water memory</div>

      <!-- Status + timer -->
      <div class="rec-status">
        <div class="rec-dot" id="recDot"></div>
        <span id="recStatusText">ready to record</span>
      </div>

      <div class="rec-timer" id="recTimer">0:00</div>

      <!-- Waveform canvas -->
      <canvas id="waveform"></canvas>

      <!-- Control buttons -->
      <div class="mem-answers" id="controlButtons">
        <button class="mem-btn" id="startBtn" onclick="startRecording()">start recording</button>
        <button class="mem-btn" id="stopBtn" onclick="stopRecording()" style="display:none;">stop recording</button>
        <div class="rec-or" id="recOr">or</div>
        <button class="mem-btn" id="uploadBtn" onclick="handleUpload()">upload a file</button>
      </div>
      <input type="file" id="uploadInput" accept="audio/*" style="display:none;" />

      <div class="rec-divider" id="divider1" style="display:none;"></div>

      <!-- Playback preview -->
      <div class="rec-preview" id="previewSection">
        <div class="mem-question" style="font-size: clamp(13pt, 1.8vw, 18pt);">listen back</div>
        <audio id="audioPreview"></audio>
        <div class="rec-player">
          <div class="rec-player-controls">
            <button class="mem-btn" id="previewPlayBtn" onclick="togglePreview()">▶ play</button>
            <div class="rec-progress-wrap" id="progressWrap" onclick="seekPreview(event)">
              <div class="rec-progress-bar" id="progressBar"></div>
            </div>
            <span class="rec-time" id="previewTime">0:00</span>
          </div>
        </div>
        <button class="mem-btn mem-btn-rerecord" onclick="reRecord()">↩ re-record</button>
      </div>

      <div class="rec-divider" id="divider2" style="display:none;"></div>

      <!-- Tag question -->
      <div class="rec-tag-section" id="tagSection">
        <div class="mem-question" style="font-size: clamp(13pt, 1.8vw, 18pt);">How would you describe your memory?</div>
        <div class="mem-answers" id="tagButtons">
          <button class="mem-btn" onclick="selectTag('sunny',   this)">sunny</button>
          <button class="mem-btn" onclick="selectTag('cloudy',  this)">cloudy</button>
          <button class="mem-btn" onclick="selectTag('stormy',  this)">stormy</button>
          <button class="mem-btn" onclick="selectTag('normy',   this)">normy</button>
        </div>
      </div>

      <div class="rec-divider" id="divider3" style="display:none;"></div>

      <!-- Send section -->
      <div class="rec-send-section" id="sendSection">
        <div class="mem-question" style="font-size: clamp(13pt, 1.8vw, 18pt);">Leave your email</div>
        <input
          class="rec-email-input"
          id="emailInput"
          type="email"
          inputmode="email"
          autocomplete="email"
          placeholder="you@example.com"
          required
        />
        <button class="mem-btn mem-btn-record" onclick="sendMemory()">send my memory to the stream</button>
        <div class="rec-feedback" id="recFeedback"></div>
      </div>

    </div>
  </div>

  <!-- Bubbles -->
  <script>
    /* ══════════════════════════════════════════
       BUBBLES
    ══════════════════════════════════════════ */
    const BUBBLE_WORDS = ['blub', 'blubblub'];
    function spawnBubble() {
      const el = document.createElement('span');
      el.className = 'bubble-word';
      el.textContent = BUBBLE_WORDS[Math.floor(Math.random() * BUBBLE_WORDS.length)];
      const x = 5 + Math.random() * 85;
      const size = (12 + Math.random() * 10).toFixed(1) + 'pt';
      const duration = (5 + Math.random() * 5).toFixed(1) + 's';
      const wobble = (Math.random() * 60 - 30).toFixed(0) + 'px';
      el.style.setProperty('--duration', duration);
      el.style.setProperty('--size', size);
      el.style.setProperty('--wobble', wobble);
      el.style.left = x + 'vw';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), parseFloat(duration) * 1000 + 100);
    }
    function scheduleBubble() {
      spawnBubble();
      setTimeout(scheduleBubble, 1200 + Math.random() * 1600);
    }
    scheduleBubble();

    /* ══════════════════════════════════════════
       RECORDER
    ══════════════════════════════════════════ */
    const UPLOAD_URL = 'https://shell.kokott.art/submissions';

    let mediaRecorder = null;
    let audioChunks   = [];
    let audioBlob     = null;
    let selectedTag   = null;
    let timerInterval = null;
    let seconds       = 0;
    let animFrame     = null;
    let analyser      = null;
    let dataArray     = null;

    const recDot        = document.getElementById('recDot');
    const recStatusText = document.getElementById('recStatusText');
    const recTimer      = document.getElementById('recTimer');
    const startBtn      = document.getElementById('startBtn');
    const stopBtn       = document.getElementById('stopBtn');
    const waveform      = document.getElementById('waveform');
    const waveCtx       = waveform.getContext('2d');

    function formatTime(s) {
      return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }

    function setStatus(text, state) {
      recStatusText.textContent = text;
      recDot.className = 'rec-dot' + (state ? ' ' + state : '');
    }

    /* ── Waveform drawing ── */
    function drawWaveform() {
      if (!analyser) return;
      animFrame = requestAnimationFrame(drawWaveform);

      const W = waveform.width  = waveform.offsetWidth;
      const H = waveform.height = waveform.offsetHeight;

      analyser.getByteTimeDomainData(dataArray);
      waveCtx.clearRect(0, 0, W, H);
      waveCtx.strokeStyle = '#0046FF';
      waveCtx.lineWidth   = 2;
      waveCtx.beginPath();

      const sliceWidth = W / dataArray.length;
      let x = 0;
      for (let i = 0; i < dataArray.length; i++) {
        const v = dataArray[i] / 128.0;
        const y = (v * H) / 2;
        i === 0 ? waveCtx.moveTo(x, y) : waveCtx.lineTo(x, y);
        x += sliceWidth;
      }
      waveCtx.lineTo(W, H / 2);
      waveCtx.stroke();
    }

    /* ── Start recording ── */
    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        // Set up Web Audio analyser for waveform
        const audioCtx = new AudioContext();
        const source   = audioCtx.createMediaStreamSource(stream);
        analyser        = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        dataArray        = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);

        // Set up MediaRecorder — prefer wav-friendly formats
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=pcm')
          ? 'audio/webm;codecs=pcm'
          : MediaRecorder.isTypeSupported('audio/webm')
          ? 'audio/webm'
          : 'audio/ogg';

        mediaRecorder = new MediaRecorder(stream, { mimeType });
        audioChunks   = [];

        mediaRecorder.addEventListener('dataavailable', e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        });

        mediaRecorder.addEventListener('stop', () => {
          stream.getTracks().forEach(t => t.stop());
          audioCtx.close();
          cancelAnimationFrame(animFrame);
          analyser = null;

          audioBlob = new Blob(audioChunks, { type: mimeType });
          const url = URL.createObjectURL(audioBlob);
          document.getElementById('audioPreview').src = url;

          // Show playback + tag + send sections
          show('divider1');
          show('previewSection', true);
          show('divider2');
          show('tagSection', true);
        });

        mediaRecorder.start(100);

        // UI — commit to recording, hide the upload alternative
        startBtn.style.display = 'none';
        stopBtn.style.display  = 'inline-flex';
        document.getElementById('uploadBtn').style.display = 'none';
        document.getElementById('recOr').style.display     = 'none';
        setStatus('recording...', 'recording');

        // Timer
        seconds = 0;
        recTimer.textContent = formatTime(0);
        timerInterval = setInterval(() => {
          seconds++;
          recTimer.textContent = formatTime(seconds);
        }, 1000);

        drawWaveform();

      } catch (err) {
        setStatus('microphone access denied', '');
        console.error(err);
      }
    }

    /* ── Stop recording ── */
    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      clearInterval(timerInterval);
      stopBtn.style.display = 'none';
      setStatus('recorded — ' + formatTime(seconds), 'done');

      // Clear waveform
      const W = waveform.width  = waveform.offsetWidth;
      const H = waveform.height = waveform.offsetHeight;
      waveCtx.clearRect(0, 0, W, H);
    }

    /* ── Re-record: reset everything back to the initial state ── */
    function reRecord() {
      audioBlob   = null;
      selectedTag = null;

      // Hide everything downstream
      ['divider1','divider2','divider3'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      ['previewSection','tagSection','sendSection'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.style.display = 'none'; el.classList.remove('visible'); }
      });

      // Reset tag selection
      document.querySelectorAll('#tagButtons .mem-btn').forEach(b => b.classList.remove('selected'));

      // Reset audio element + player UI
      document.getElementById('audioPreview').src = '';
      progressBar.style.width    = '0%';
      previewTime.textContent    = '0:00';
      previewPlayBtn.textContent = '▶ play';

      // Reset status + timer + waveform
      setStatus('ready to record', '');
      recTimer.textContent = '0:00';
      const W = waveform.width  = waveform.offsetWidth;
      const H = waveform.height = waveform.offsetHeight;
      waveCtx.clearRect(0, 0, W, H);

      // Restore record + upload options
      startBtn.style.display = '';
      document.getElementById('uploadBtn').style.display = '';
      document.getElementById('recOr').style.display     = '';
    }

    /* ── Upload a file ── */
    function handleUpload() {
      document.getElementById('uploadInput').click();
    }

    document.getElementById('uploadInput').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;

      audioBlob = file;
      document.getElementById('audioPreview').src = URL.createObjectURL(file);

      // Hide record / upload buttons
      startBtn.style.display  = 'none';
      document.getElementById('uploadBtn').style.display = 'none';
      document.getElementById('recOr').style.display     = 'none';

      // Update status; clear timer (no duration during upload)
      const label = file.name.length > 32 ? file.name.slice(0, 29) + '…' : file.name;
      setStatus('file loaded — ' + label, 'done');
      recTimer.textContent = '';

      // Show same preview → tag → send flow as after recording
      show('divider1');
      show('previewSection', true);
      show('divider2');
      show('tagSection', true);
    });

    /* ── Tag selection ── */
    function selectTag(tag, btn) {
      selectedTag = tag;
      document.querySelectorAll('#tagButtons .mem-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      show('divider3');
      show('sendSection', true);
    }

    /* ── Basic email validation: one "@", a dotted domain, no spaces ── */
    function isValidEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    /* ── Send to shell.kokott.art ── */
    async function sendMemory() {
      if (!audioBlob) {
        setFeedback('no recording found — please record first');
        return;
      }
      if (!selectedTag) {
        setFeedback('please choose a tag first');
        return;
      }

      const email = document.getElementById('emailInput').value.trim();
      if (!email) {
        setFeedback('please enter your email first');
        return;
      }
      if (!isValidEmail(email)) {
        setFeedback('that email doesn’t look right — please check it');
        return;
      }

      setFeedback('sending...');

      // Name the file with the extension that matches what we actually
      // recorded. The server (shell.phone POST /submissions) trusts the
      // filename extension, so a fake .wav on webm data would mislabel it.
      const ext = (() => {
        if (audioBlob instanceof File) {
          const dot = audioBlob.name.lastIndexOf('.');
          return dot !== -1 ? audioBlob.name.slice(dot) : '.audio';
        }
        const type = (audioBlob.type || '').toLowerCase();
        return type.includes('ogg') ? '.ogg' : '.webm';
      })();
      const filename = 'memory-' + selectedTag + '-' + Date.now() + ext;

      // Fields match shell.phone's multipart parser: tag, email, file.
      const formData = new FormData();
      formData.append('tag',   selectedTag);
      formData.append('email', email);
      formData.append('file',  audioBlob, filename);

      try {
        const res = await fetch(UPLOAD_URL, {
          method: 'POST',
          body:   formData,
        });

        if (res.ok) {
          window.location.href = 'thankyou.html';
        } else {
          const text = await res.text();
          setFeedback('something went wrong (' + res.status + '). please try again.');
          console.error(text);
        }
      } catch (err) {
        setFeedback('could not reach the stream. check your connection.');
        console.error(err);
      }
    }

    function setFeedback(msg) {
      document.getElementById('recFeedback').textContent = msg;
    }

    function show(id, flex) {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.display = flex ? 'flex' : 'block';
      if (flex) el.classList.add('visible');
    }

    /* ── Custom audio preview player ── */
    const audioPreview   = document.getElementById('audioPreview');
    const previewPlayBtn = document.getElementById('previewPlayBtn');
    const progressBar    = document.getElementById('progressBar');
    const previewTime    = document.getElementById('previewTime');

    function togglePreview() {
      if (audioPreview.paused) {
        audioPreview.play();
        previewPlayBtn.textContent = '⏸ pause';
      } else {
        audioPreview.pause();
        previewPlayBtn.textContent = '▶ play';
      }
    }

    audioPreview.addEventListener('timeupdate', () => {
      if (!audioPreview.duration) return;
      const pct = (audioPreview.currentTime / audioPreview.duration) * 100;
      progressBar.style.width = pct + '%';
      previewTime.textContent = formatTime(Math.floor(audioPreview.currentTime));
    });

    audioPreview.addEventListener('ended', () => {
      previewPlayBtn.textContent = '▶ play';
      progressBar.style.width = '0%';
      previewTime.textContent = '0:00';
    });

    function seekPreview(e) {
      if (!audioPreview.duration) return;
      const rect = document.getElementById('progressWrap').getBoundingClientRect();
      const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      audioPreview.currentTime = pct * audioPreview.duration;
    }
  </script>
</body>
</html>
